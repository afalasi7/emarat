<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Emarat</title>
    <meta
      name="description"
      content="Emarat prayer companion. Open the live app with full backend support."
    />
    <style>
      :root {
        color-scheme: light dark;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        font-family:
          "Inter",
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        background: #fff;
        color: #111;
        display: grid;
        place-items: center;
        padding: 24px;
      }
      .card {
        width: min(720px, 100%);
        border: 1px solid #111;
        border-radius: 20px;
        padding: 28px;
        background: #fff;
      }
      h1 {
        margin: 0 0 10px;
        font-size: clamp(1.8rem, 4vw, 2.4rem);
        line-height: 1.15;
        letter-spacing: -0.03em;
      }
      p {
        margin: 0 0 18px;
        line-height: 1.6;
      }
      .meta {
        font-size: 0.85rem;
        text-transform: uppercase;
        letter-spacing: 0.14em;
        margin-bottom: 10px;
      }
      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }
      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 12px 16px;
        border-radius: 999px;
        border: 1px solid #111;
        color: #111;
        text-decoration: none;
        font-weight: 600;
      }
      a.primary {
        background: #111;
        color: #fff;
      }
      .hint {
        margin-top: 16px;
        font-size: 0.9rem;
      }
      @media (prefers-color-scheme: dark) {
        body {
          background: #000;
          color: #f5f5f5;
        }
        .card {
          background: #000;
          border-color: #f5f5f5;
        }
        a {
          border-color: #f5f5f5;
          color: #f5f5f5;
        }
        a.primary {
          background: #f5f5f5;
          color: #000;
        }
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="meta">Emarat Prayer Companion</div>
      <h1>Live app runs on VPS backend</h1>
      <p>
        GitHub Pages is static-only, so full authentication and prayer APIs are served
        from the production app.
      </p>
      <div class="actions">
        <a class="primary" href="https://emarat.alfalasi.io">Open Live App</a>
        <a href="https://emarat.alfalasi.io/desktop">Desktop Preview</a>
      </div>
      <p class="hint">This page is the static GitHub Pages entrypoint.</p>
    </main>
  </body>
</html>
